    title: USCIRF JSON-LD Context
  - type: Integrations
    data:
      - name: U.S. Department of State
        description: >-
          USCIRF works with the State Department's Office of International
          Religious Freedom, and State uses USCIRF recommendations for CPC
          and SWL designations.
      - name: U.S. Congress
        description: >-
          USCIRF reports directly to Congress, submitting annual and special
          reports with legislative recommendations.

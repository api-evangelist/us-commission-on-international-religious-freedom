  - type: Features
    data:
      - name: Annual Report
        description: >-
          Comprehensive annual report documenting religious freedom conditions
          in countries worldwide, with CPC and SWL designations and policy
          recommendations to the U.S. government.
      - name: Countries of Particular Concern Designations
        description: >-
          Formal designation recommendations for countries that engage in or
          tolerate particularly severe violations of religious freedom, used
          to guide U.S. foreign policy.
      - name: Special Watch List
        description: >-
          Countries that do not meet the CPC threshold but require close
          monitoring due to severe violations of religious freedom.
      - name: Entities of Particular Concern
        description: >-
          Non-state actor designations for groups that engage in particularly
          severe violations of religious freedom abroad.
      - name: Country Reports and Fact Sheets
        description: >-
          Detailed country-by-country assessments of religious freedom conditions,
          minority group situations, and government treatment of religious communities.
      - name: Policy Briefs and Recommendations
        description: >-
          Targeted policy recommendations on specific issues, countries, or
          legislation for the President, Secretary of State, and Congress.
  - type: UseCases
    data:
      - name: Foreign Policy Analysis
        description: >-
          Using USCIRF designations and reports to understand U.S. government
          positions on international religious freedom and foreign policy priorities.
      - name: Country Risk Assessment
        description: >-
          Assessing religious freedom risks in specific countries using CPC, SWL,
          and country report data for diplomatic, humanitarian, or business purposes.
      - name: Human Rights Research
        description: >-
          Academic and advocacy research on international religious freedom
          conditions, trends, and the effectiveness of U.S. policy interventions.
      - name: Refugee and Asylum Applications
        description: >-
          Using USCIRF country assessments as supporting documentation for
          asylum claims and refugee status determinations involving religious persecution.
      - name: Congressional and Policy Advocacy
        description: >-
          Informing legislative advocacy and policy development using USCIRF
          recommendations and findings on specific countries or religious freedom issues.
  - type: Vocabulary
    url: >-
      https://raw.githubusercontent.com/api-evangelist/us-commission-on-international-religious-freedom/refs/heads/main/vocabulary/us-commission-on-international-religious-freedom-vocabulary.yml

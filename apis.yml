description: >-
  The US Commission on International Religious Freedom (USCIRF) is an independent,
  bipartisan federal government commission created by the International Religious Freedom
  Act (IRFA) of 1998. USCIRF monitors the universal right to freedom of religion or
  belief abroad, reviews the facts and circumstances of violations of religious freedom
  internationally, and makes policy recommendations to the President, Secretary of State,
  and Congress. The Commission publishes an annual report designating Countries of
  Particular Concern (CPCs) and Special Watch List (SWL) countries, and recommends
  Entities of Particular Concern (EPCs) among non-state actors.

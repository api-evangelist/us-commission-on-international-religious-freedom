    description: >-
      The US Commission on International Religious Freedom (USCIRF) is an
      independent, bipartisan federal government commission created by the
      International Religious Freedom Act of 1998 that monitors religious
      freedom violations abroad and makes policy recommendations to the
      President, Secretary of State, and Congress. USCIRF designates Countries
      of Particular Concern (CPCs), Special Watch List (SWL) countries, and
      Entities of Particular Concern (EPCs) based on systematic, ongoing,
      egregious violations of religious freedom.
